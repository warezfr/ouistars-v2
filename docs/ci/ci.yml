name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qualite:
    name: Typecheck · Lint · Tests unitaires & intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npx vitest run --coverage
      - name: Gate de couverture — cœur tarifaire
        run: |
          node -e "
          const s = require('./coverage/coverage-final.json');
          const paths = Object.keys(s);
          function pct(filter) {
            let cov = 0, tot = 0;
            for (const p of paths.filter(filter)) {
              const st = s[p].s, m = s[p].statementMap;
              for (const k of Object.keys(m)) { tot++; if (st[k] > 0) cov++; }
            }
            return tot ? (100 * cov / tot) : 100;
          }
          const core = pct(p => /src\/lib\/(pricing|estimate)|server\/pricing|server\/etg\/(auth|pricing)/.test(p));
          const apis = pct(p => /\/api\//.test(p));
          console.log('cœur tarifaire :', core.toFixed(1), '% · APIs :', apis.toFixed(1), '%');
          if (core < 80) { console.error('✗ couverture cœur < 80 %'); process.exit(1); }
          if (apis < 60) { console.error('✗ couverture APIs < 60 %'); process.exit(1); }
          "

  build-securite:
    name: Build · Garde-fous sécurité du bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      - name: Aucun secret dans le bundle
        run: |
          # Valeurs de secrets (pas les simples noms de variables dans des messages UI) :
          # - JWT Supabase service-role : son payload base64 contient « c2VydmljZV9yb2xl » (= service_role)
          # - Jetons GitHub (ghp_) et Resend (re_…)
          if grep -rlE "c2VydmljZV9yb2xl" dist/ 2>/dev/null; then
            echo '✗ clé Supabase SERVICE ROLE détectée dans le bundle client' && exit 1
          fi
          if grep -rlE "ghp_[A-Za-z0-9]{30,}" dist/ 2>/dev/null; then
            echo '✗ jeton GitHub détecté dans le bundle' && exit 1
          fi
          if grep -rloE "\"re_[A-Za-z0-9]{20,}\"" dist/ 2>/dev/null | head -1 | grep -q .; then
            echo '✗ clé Resend détectée dans le bundle' && exit 1
          fi
          echo '✓ bundle propre'
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist, retention-days: 3 }

  e2e:
    name: E2E · Visuel · Accessibilité
    runs-on: ubuntu-latest
    needs: build-securite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
