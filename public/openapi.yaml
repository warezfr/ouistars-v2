openapi: 3.1.0
info:
  title: Oui Stars ETG Transfers Supplier API
  description: Supplier API for ETG Transfers to search, book, check status, and cancel transfers.
  version: 1.0.0
servers:
  - url: https://ouistars-v2.vercel.app
    description: Production Server

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:
    GeoPoint:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [iata, coordinates]
        iata:
          type: string
          maxLength: 4
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
        address:
          type: string

    Upsell:
      type: object
      required:
        - id
        - type
        - price
        - count
        - max_count
      properties:
        id:
          type: string
        type:
          type: string
        price:
          type: number
        count:
          type: integer
        max_count:
          type: integer

    EtgOffer:
      type: object
      required:
        - id
        - transfer_category
        - car_model
        - seats
        - luggage_places
        - distance
        - estimated_duration_minutes
        - included_waiting_time_minutes
        - tolls_included
        - gratuity_included
        - free_cancel_until
        - price
        - children_seat_0
        - children_seat_1
        - children_seat_2
        - children_seat_3
        - upsells
      properties:
        id:
          type: string
        transfer_category:
          type: string
          enum: [business, business_van, first, electro_business, minibus]
        car_model:
          type: string
        seats:
          type: integer
        luggage_places:
          type: integer
        distance:
          type: number
        estimated_duration_minutes:
          type: integer
        included_waiting_time_minutes:
          type: integer
        tolls_included:
          type: boolean
        gratuity_included:
          type: boolean
        free_cancel_until:
          type: string
          format: date-time
        price:
          type: object
          required: [amount, currency]
          properties:
            amount:
              type: number
            currency:
              type: string
        children_seat_0:
          type: integer
        children_seat_1:
          type: integer
        children_seat_2:
          type: integer
        children_seat_3:
          type: integer
        upsells:
          type: array
          items:
            $ref: '#/components/schemas/Upsell'
        rate_card_id:
          type: string

    ApiError:
      type: object
      required:
        - code
        - error
      properties:
        code:
          type: string
        error:
          type: string

security:
  - basicAuth: []

paths:
  /search:
    post:
      summary: Search for available transfers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_date_time
                - passengers
                - start_point
                - end_point
              properties:
                start_date_time:
                  type: string
                  format: date-time
                passengers:
                  type: integer
                  minimum: 1
                children_seat_0:
                  type: integer
                  default: 0
                children_seat_1:
                  type: integer
                  default: 0
                children_seat_2:
                  type: integer
                  default: 0
                children_seat_3:
                  type: integer
                  default: 0
                start_point:
                  $ref: '#/components/schemas/GeoPoint'
                end_point:
                  $ref: '#/components/schemas/GeoPoint'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - start_date_time
                  - offers
                properties:
                  start_date_time:
                    type: string
                    format: date-time
                  offers:
                    type: array
                    items:
                      $ref: '#/components/schemas/EtgOffer'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /book:
    post:
      summary: Book a transfer offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - offer_id
                - start_point
                - end_point
                - passengers
                - luggage_places
                - main_passenger
              properties:
                offer_id:
                  type: string
                start_point:
                  $ref: '#/components/schemas/GeoPoint'
                end_point:
                  $ref: '#/components/schemas/GeoPoint'
                passengers:
                  type: integer
                  minimum: 1
                luggage_places:
                  type: integer
                  minimum: 0
                sport_luggage_places:
                  type: integer
                  minimum: 0
                animals_places:
                  type: integer
                  minimum: 0
                wheelchairs_places:
                  type: integer
                  minimum: 0
                children_seat_0:
                  type: integer
                  minimum: 0
                children_seat_1:
                  type: integer
                  minimum: 0
                children_seat_2:
                  type: integer
                  minimum: 0
                children_seat_3:
                  type: integer
                  minimum: 0
                main_passenger:
                  type: object
                  required:
                    - first_name
                    - last_name
                    - phone_number
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    phone_number:
                      type: string
                    email:
                      type: string
                      format: email
                flight_number:
                  type: string
                  maxLength: 20
                shield_text:
                  type: string
                  maxLength: 1000
                comment:
                  type: string
                  maxLength: 2000
                upsells:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - count
                    properties:
                      id:
                        type: string
                      count:
                        type: integer
      responses:
        '200':
          description: Booking confirmed
          content:
            application/json:
              schema:
                type: object
                required:
                  - order_id
                  - supplier_link
                  - start_time
                  - distance
                  - estimated_duration_minutes
                  - included_waiting_time_minutes
                  - passengers
                  - luggage_places
                  - price
                properties:
                  order_id:
                    type: string
                  supplier_link:
                    type: string
                  start_time:
                    type: string
                    format: date-time
                  distance:
                    type: number
                  estimated_duration_minutes:
                    type: integer
                  included_waiting_time_minutes:
                    type: integer
                  passengers:
                    type: integer
                  luggage_places:
                    type: integer
                  price:
                    type: object
                    required: [amount, currency]
                    properties:
                      amount:
                        type: number
                      currency:
                        type: string
                  children_seat_0:
                    type: integer
                  children_seat_1:
                    type: integer
                  children_seat_2:
                    type: integer
                  children_seat_3:
                    type: integer
                  sport_luggage_places:
                    type: integer
                  animals:
                    type: integer
                  wheelchairs_places:
                    type: integer
                  upsells:
                    type: array
                    items:
                      $ref: '#/components/schemas/Upsell'
                  meeting_instructions:
                    type: string
                  meeting_images:
                    type: array
                    items:
                      type: string
                  buffer_time_minutes:
                    type: integer
        '400':
          description: Validation or offer error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /status:
    post:
      summary: Get order status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - order_id
              properties:
                order_id:
                  type: string
      responses:
        '200':
          description: Current order status
          content:
            application/json:
              schema:
                type: object
                required:
                  - order_id
                  - status
                  - start_time
                  - price
                properties:
                  order_id:
                    type: string
                  status:
                    type: string
                    enum: [completed, cancelled]
                  start_time:
                    type: string
                    format: date-time
                  price:
                    type: object
                    required: [amount, currency]
                    properties:
                      amount:
                        type: number
                      currency:
                        type: string
                  passengers:
                    type: integer
                  luggage_places:
                    type: integer
                  included_waiting_time_minutes:
                    type: integer
                  driver_info:
                    type: object
                    required: [phone]
                    properties:
                      phone:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                      carrier_company_name:
                        type: string
                  car_info:
                    type: object
                    required: [car_model, plate_number]
                    properties:
                      car_model:
                        type: string
                      plate_number:
                        type: string
                      color:
                        type: string
                  meeting_info:
                    type: object
                    properties:
                      instructions:
                        type: string
                      images:
                        type: array
                        items:
                          type: string
                  main_passenger:
                    type: object
                    properties:
                      first_name:
                        type: string
                      last_name:
                        type: string
                      phone_number:
                        type: string
                      email:
                        type: string
                  comment:
                    type: string
                  shield_text:
                    type: string
                  transfer_category:
                    type: string
                  free_cancel_until:
                    type: string
                    format: date-time
                  buffer_time_minutes:
                    type: integer
        '400':
          description: Order not found or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /cancel:
    post:
      summary: Cancel an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - order_id
              properties:
                order_id:
                  type: string
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                type: object
                required:
                  - order_id
                  - penalty
                properties:
                  order_id:
                    type: string
                  penalty:
                    type: object
                    required: [amount, currency]
                    properties:
                      amount:
                        type: number
                      currency:
                        type: string
        '400':
          description: Order not found or already cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
